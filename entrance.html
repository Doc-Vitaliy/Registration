<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід Робітника | DC-Link</title>
</head>
<body>

<div class="card">
    <h2>Реєстрація зміни</h2>
    
    <div id="message-area"></div>

    <div class="form-group">
    <label>Працівник</label>
    <div class="select-wrapper">
        <input type="text" id="worker-search" list="worker-list" placeholder="Почніть вводити ПІБ або оберіть зі списку..." autocomplete="off" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
        <datalist id="worker-list"></datalist>
        <button class="btn-refresh-inline" onclick="refreshUsers()" title="Оновити список" style="margin-left: 5px;">🔄</button>
    </div>
    </div>

    <div class="form-group">
        <label>ПІН-код (4 цифри)</label>
        <input type="password" id="pin" class="pin-field" placeholder="****" 
               maxlength="4" inputmode="numeric" pattern="[0-9]{4}">
    </div>

    <button id="btn-entry" class="btn-entry" onclick="submitAttendance('ВХІД')">ПОЧАТИ ЗМІНУ</button>
    <button class="btn-exit" onclick="submitAttendance('ВИХІД')">ЗАВЕРШИТИ ЗМІНУ</button>
    
    <button class="btn-back">Повернутися в меню</button>
</div>

<script>
(function() {
    // ========== ВИЗНАЧЕННЯ ФУНКЦІЙ (ОДИН РАЗ) ==========
    if (!window._entranceFunctionsDefined) {
        window._entranceFunctionsDefined = true;

        window.refreshUsers = async function() {
            await window.loadEntranceWorkers(true);
            window.showMessageInEntrance("✅ Список працівників оновлено", "success");
        };

        window.submitAttendance = async function(type) {
            const searchInput = document.getElementById('worker-search');
            const datalist = document.getElementById('worker-list');
            const pinInput = document.getElementById('pin');
            
            if (!searchInput.value) { window.showMessageInEntrance("❌ Оберіть або введіть працівника", "error"); return; }
            if (!pinInput.value || pinInput.value.length !== 4) { window.showMessageInEntrance("❌ Введіть 4-цифровий ПІН-код", "error"); return; }
            
            // Шукаємо відповідність введеного тексту з даними у datalist
            let matchedWorker = null;
            const options = datalist.getElementsByTagName('option');
            for (let opt of options) {
                if (opt.textContent === searchInput.value.trim()) {
                    try { matchedWorker = JSON.parse(opt.getAttribute('data-user')); } catch(e) {}
                    break;
                }
            }

            if (!matchedWorker) { window.showMessageInEntrance("❌ Працівника не знайдено у списку баз даних", "error"); return; }
            if (String(matchedWorker.pin) !== pinInput.value) { window.showMessageInEntrance("❌ Невірний ПІН-код!", "error"); pinInput.value = ""; return; }

            const btn = document.getElementById('btn-entry');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "Відправка...";

            const apiUrl = window.getApiUrl ? window.getApiUrl() : localStorage.getItem('apps_script_url');
            if (!apiUrl) { window.showMessageInEntrance("❌ API не налаштовано", "error"); btn.disabled = false; btn.innerText = originalText; return; }

            const url = new URL(apiUrl);
            url.searchParams.append('action', 'reg_worker_attendance');
            url.searchParams.append('fio', matchedWorker.name);
            url.searchParams.append('floor', document.getElementById('floor')?.value || '1');
            url.searchParams.append('type', type);

            try {
                const response = await fetch(url.toString());
                const result = await response.json();
                if (result.status === "success") {
                    window.showMessageInEntrance(`✅ ${type} зафіксовано для: ${matchedWorker.name}`, "success");
                    pinInput.value = "";
                    searchInput.value = ""; // Очищаємо поле пошуку після успіху
                } else throw new Error(result.message);
            } catch (error) { window.showMessageInEntrance(`❌ Помилка: ${error.message}`, "error"); }
            finally { btn.disabled = false; btn.innerText = originalText; }
        };

        window.showMessageInEntrance = function(text, type) {
            const msgDiv = document.getElementById('message-area');
            if (!msgDiv) return;
            msgDiv.innerHTML = `<div class="${type === "error" ? "error" : "success"}">${text}</div>`;
            setTimeout(() => msgDiv.innerHTML = "", 4000);
        };
    }

    // ========== ФУНКЦІЯ ЗАВАНТАЖЕННЯ ПРАЦІВНИКІВ (ВИКЛИКАЄТЬСЯ КОЖНОГО РАЗУ) ==========
  window.loadEntranceWorkers = async function(forceRefresh = false) {
        const datalist = document.getElementById('worker-list');
        const searchInput = document.getElementById('worker-search');
        if (!datalist) return;
        datalist.innerHTML = '';
        try {
            const users = await window.getCachedData('users', forceRefresh);
            if (!users || !Array.isArray(users)) throw new Error("Немає даних");
            const workers = users.filter(u => !u.role || u.role.toLowerCase() !== 'охорона');
            if (workers.length === 0) {
                window.showMessageInEntrance("⚠️ У базі відсутні працівники", "error");
                return;
            }
            
            workers.forEach(w => {
                const opt = document.createElement('option');
                opt.value = w.name; // Те, що буде відображатися і фільтруватися при введенні
                opt.setAttribute('data-user', JSON.stringify({ name: w.name, pin: w.pin }));
                datalist.appendChild(opt);
            });
        } catch (error) {
            console.error(error);
            window.showMessageInEntrance("Не вдалося завантажити список працівників", "error");
        }
    };

    // ========== ЗАПУСК ПРИ КОЖНОМУ ВІДКРИТТІ СТОРІНКИ ==========
    window.loadEntranceWorkers(false);
})();
</script>
</body>
</html>
