<body>

<button class="settings-btn" onclick="resetApiUrl()" title="Налаштувати API">⚙️</button>

<script>
    // ---------- ГЛОБАЛЬНІ ЗМІННІ ТА ФУНКЦІЇ ----------
    window.API_URL = localStorage.getItem('apps_script_url');
    window.guardsList = [];

    window.getApiUrl = function() {
        if (window.API_URL) return window.API_URL;
        let url = localStorage.getItem('apps_script_url');
        if (!url) {
            url = prompt("Вставте посилання на Google Apps Script (Web App URL):");
            if (url && url.includes("script.google.com")) {
                localStorage.setItem('apps_script_url', url);
            } else if (url) {
                alert("Невірне посилання. Спробуйте ще раз.");
                return window.getApiUrl();
            }
        }
        window.API_URL = url;
        return url;
    };

    window.loadGuards = async function(force = false) {
        const cacheKey = 'guards_list';
        const cache = sessionStorage.getItem(cacheKey);
        if (!force && cache) {
            try {
                window.guardsList = JSON.parse(cache);
                return window.guardsList;
            } catch(e) {}
        }
        const url = window.getApiUrl();
        if (!url) return [];
        try {
            const resp = await fetch(`${url}?logType=users`);
            const users = await resp.json();
            const guards = (Array.isArray(users) ? users : []).filter(u => 
                u.role && u.role.toString().toLowerCase().trim() === "охорона"
            );
            window.guardsList = guards;
            sessionStorage.setItem(cacheKey, JSON.stringify(guards));
            return guards;
        } catch(e) {
            console.error("Помилка завантаження охоронців", e);
            return [];
        }
    };
	window.loadGlobalDrivers = async function(force = false) {
			const cacheKey = 'global_drivers_list';
			const cache = sessionStorage.getItem(cacheKey);
			if (!force && cache) {
				try { return JSON.parse(cache); } catch(e) {}
			}
			const url = window.getApiUrl();
			if (!url) return [];
			try {
				const resp = await fetch(`${url}?logType=drivers_list_data`);
				const data = await resp.json();
				if (Array.isArray(data) && data.length) {
					sessionStorage.setItem(cacheKey, JSON.stringify(data));
					console.log("🚚 Водії завантажені в кеш index.html");
					return data;
				}
				return [];
			} catch(e) {
				console.error("Помилка фонового завантаження водіїв:", e);
				return [];
			}
		};
    window.verifyGuardPin = async function(guardName, pin) {
        if (!window.guardsList.length) await window.loadGuards();
        const guard = window.guardsList.find(g => g.name === guardName);
        return guard && guard.pin === pin;
    };

    window.showMessage = function(elementId, msg, type) {
        const div = document.getElementById(elementId);
        if (!div) return;
        div.innerHTML = `<div class="${type}">${msg}</div>`;
        setTimeout(() => {
            if (div.innerHTML === `<div class="${type}">${msg}</div>`) div.innerHTML = "";
        }, 4000);
    };

    // ---------- НАВІГАЦІЯ ----------
    let mainMenuHTML = "";
    document.addEventListener("DOMContentLoaded", function() {
        mainMenuHTML = document.getElementById('page-content').innerHTML;
        window.getApiUrl();
        window.loadGuards();
		window.loadGlobalDrivers();
           });
			window.getCachedData = async function(key, forceRefresh = false) {
			const url = window.getApiUrl();
			if (!url) return null;
			
			const cacheKey = `cached_${key}`;
			const cached = sessionStorage.getItem(cacheKey);
			const TTL = 60 * 60 * 1000; // 1 година
			
			if (!forceRefresh && cached) {
				try {
					const parsed = JSON.parse(cached);
					if (parsed.timestamp && (Date.now() - parsed.timestamp) < TTL) {
						return parsed.data;
					}
				} catch(e) {}
			}
			
			// Визначаємо, який запит робити залежно від ключа
			let data = null;
			try {
				if (key === 'users') {
					const resp = await fetch(`${url}?logType=users`);
					data = await resp.json();
				} else if (key === 'locations') {
					const resp = await fetch(`${url}?logType=locations`);
					data = await resp.json();
				} else if (key === 'ramps') {
					const resp = await fetch(`${url}?action=get_ramps`);
					data = await resp.json();
				} else {
					return null;
				}
				if (Array.isArray(data)) {
					sessionStorage.setItem(cacheKey, JSON.stringify({ timestamp: Date.now(), data: data }));
					return data;
				}
				return [];
			} catch(e) {
				console.error(`Помилка завантаження ${key}:`, e);
				return [];
			}
		};

		// Попереднє завантаження всіх даних після отримання API
		async function preloadAllData() {
			await window.getCachedData('users');
			await window.getCachedData('locations');
			await window.getCachedData('ramps');
		}

		// Викликати після window.getApiUrl() (в DOMContentLoaded)
		preloadAllData();

	
    async function navigateToPage(event, url) {
        event.preventDefault();
        const contentDiv = document.getElementById('page-content');
        contentDiv.style.opacity = 0;
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("Не вдалося завантажити сторінку");
            const htmlText = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            const targetContainer = doc.querySelector('.container') || doc.body;
            contentDiv.innerHTML = `<div class="dynamic-wrapper">${targetContainer.innerHTML}</div>`;
            const backBtn = contentDiv.querySelector('.btn-back');
            if (backBtn) {
                backBtn.href = "#";
                backBtn.removeAttribute('onclick');
                backBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    loadMainMenu();
                });
            }
            contentDiv.style.opacity = 1;
            const scripts = doc.querySelectorAll('script:not([src])');
            scripts.forEach(script => {
                const newScript = document.createElement('script');
                newScript.text = script.text;
                document.body.appendChild(newScript);
                document.body.removeChild(newScript);
            });
        } catch (error) {
            contentDiv.style.opacity = 1;
            alert("Помилка підвантаження: " + error.message);
        }
    }

    function loadMainMenu() {
        const contentDiv = document.getElementById('page-content');
        contentDiv.style.opacity = 0;
        setTimeout(() => {
            contentDiv.innerHTML = mainMenuHTML;
            contentDiv.style.opacity = 1;
        }, 200);
    }

  	// Оновлення функції скидання API
		function resetApiUrl() {
			if (confirm("Змінити посилання на API?")) {
				localStorage.removeItem('apps_script_url');
				sessionStorage.clear(); // очищаємо весь кеш
				window.location.reload();
			}
		}

</script>
