<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завантаження/Вивантаження | DC-Link</title>
        </head>
<body>
<div class="container" style="max-width: 500px; margin: 20px auto;">
    <div class="card">
        <h2>⬇️⬆️ Завантаження / Вивантаження</h2>
        <div id="message"></div>
        <div class="form-group">
            <label>Номер авто *</label>
            <input type="text" id="car_number" placeholder="Наприклад: ВО1234АА" required>
        </div>
        <div class="form-group">
            <label>ПІБ водія/відповідального *</label>
            <input type="text" id="driver" placeholder="Прізвище Ім'я" required>
        </div>
        <div class="form-group">
            <label>Організація</label>
            <input type="text" id="organization" placeholder="Назва фірми">
        </div>
        <div class="form-group">
            <label>№ телефону</label>
            <input type="tel" id="phone" placeholder="0991234567" pattern="[0-9]{10}">
        </div>
        <hr>
        <div class="form-group">
            <label>Охоронець (хто реєструє)</label>
            <select id="guard_name"><option value="">-- Завантаження --</option></select>
        </div>
        <div class="form-group">
            <label>ПІН-код охоронця</label>
            <input type="password" id="guard_pin" maxlength="4" inputmode="numeric" placeholder="****">
        </div>
        <div class="button-group">
            <button class="btn-load" onclick="registerOperation('Завантаження')">📦 Завантаження</button>
            <button class="btn-unload" onclick="registerOperation('Вивантаження')">📦 Вивантаження</button>
        </div>
        <a href="index.html" class="btn-back" style="display: block; text-align: center; margin-top: 15px;">⬅ На головну</a>
    </div>
</div>
<script>
   (function() {
    if (window._loadingLoaded) return;
    window._loadingLoaded = true;

    let API_URL = null;
    let guardsList = [];

    async function getApiUrl() {
        if (API_URL) return API_URL;
        if (typeof window.getApiUrl === 'function') {
            API_URL = window.getApiUrl();
        } else {
            let url = localStorage.getItem('apps_script_url');
            if (!url) {
                url = prompt("Вставте посилання на Google Apps Script:");
                if (url && url.includes("script.google.com")) {
                    localStorage.setItem('apps_script_url', url);
                } else if (url) alert("Невірне посилання");
            }
            API_URL = url;
        }
        return API_URL;
    }

    async function loadGuards() {
        const select = document.getElementById('guard_name');
        if (!select) return;
        const url = await getApiUrl();
        if (!url) {
            select.innerHTML = '<option value="">-- API не налаштовано --</option>';
            return;
        }
        try {
            const resp = await fetch(`${url}?logType=users`);
            const users = await resp.json();
            guardsList = Array.isArray(users) ? users.filter(u => u.role && u.role.toLowerCase() === "охорона") : [];
            select.innerHTML = '<option value="">-- Виберіть охоронця --</option>';
            guardsList.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g.name;
                opt.textContent = g.name;
                select.appendChild(opt);
            });
        } catch(e) { console.error(e); showMessage("Не вдалося завантажити охоронців", "error"); }
    }

    window.registerOperation = async function(type) {
        const car = document.getElementById('car_number').value.trim();
        const driver = document.getElementById('driver').value.trim();
        const org = document.getElementById('organization').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const guardName = document.getElementById('guard_name').value;
        const pin = document.getElementById('guard_pin').value;

        if (!car || !driver) { showMessage("Заповніть номер авто та ПІБ водія", "error"); return; }
        if (!guardName || !pin || pin.length !== 4) { showMessage("Оберіть охоронця та введіть ПІН-код", "error"); return; }
        const guard = guardsList.find(g => g.name === guardName);
        if (!guard || guard.pin !== pin) { showMessage("Невірний ПІН-код охоронця", "error"); document.getElementById('guard_pin').value = ""; return; }

        const url = new URL(await getApiUrl());
        url.searchParams.append('action', 'reg_loading');
        url.searchParams.append('type', type);
        url.searchParams.append('car', car);
        url.searchParams.append('driver', driver);
        url.searchParams.append('organization', org);
        url.searchParams.append('phone', phone);
        url.searchParams.append('guard', guardName);
        try {
            const resp = await fetch(url.toString());
            const result = await resp.json();
            if (result.status === "success") {
                showMessage(`${type} зафіксовано (авто ${car})`, "success");
                document.getElementById('car_number').value = "";
                document.getElementById('driver').value = "";
                document.getElementById('organization').value = "";
                document.getElementById('phone').value = "";
                document.getElementById('guard_pin').value = "";
            } else throw new Error(result.message);
        } catch(e) { showMessage("Помилка: " + e.message, "error"); }
    };

    function showMessage(msg, type) {
        const div = document.getElementById('message');
        if (div) div.innerHTML = `<div class="${type}">${msg}</div>`;
        setTimeout(() => { if (div && div.innerHTML === `<div class="${type}">${msg}</div>`) div.innerHTML = ""; }, 4000);
    }

    (async function() {
        await getApiUrl();
        if (API_URL) await loadGuards();
    })();
})();
</script>
</body>
</html>
