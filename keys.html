<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видача/Повернення ключів | DC-Link</title>
</head>
<body>
<div class="container">
    <div class="card">
        <h2> Журнал ключів</h2>
        <div id="message-area"></div>

        <div class="mode-container">
            <button id="mode-issue" class="mode-btn active-issue"> Видача ключа</button>
            <button id="mode-return" class="mode-btn">🔄 Повернення</button>
        </div>

        <div id="issue-fields">
            <div class="form-group">
                <label>Співробітник (отримувач) *</label>
                <div class="select-wrapper">
                    <select id="worker-list"><option value="">-- Завантаження... --</option></select>
                    <button type="button" class="btn-refresh-inline" id="refreshWorkersBtn" title="Оновити список">🔄</button>
                </div>
            </div>
            <div class="form-group">
                <label>Приміщення *</label>
                <div class="select-wrapper">
                    <select id="location-list"><option value="">-- Завантаження... --</option></select>
                    <button type="button" class="btn-refresh-inline" id="refreshLocationsBtn" title="Оновити приміщення">🔄</button>
                </div>
            </div>
        </div>

        <div id="return-fields" style="display: none;">
            <div class="form-group">
                <label>Приміщення (з якого повертають ключ) *</label>
                <div class="select-wrapper">
                    <select id="return-location-list"><option value="">-- Завантаження... --</option></select>
                    <button type="button" class="btn-refresh-inline" id="refreshReturnLocationsBtn" title="Оновити приміщення">🔄</button>
                </div>
            </div>
        </div>

        <hr>

        <div class="form-group">
            <label>Охоронець (хто реєструє операцію)</label>
            <div class="select-wrapper">
                <select id="guard_name"><option value="">-- Завантаження --</option></select>
                <button type="button" class="btn-refresh-inline" id="refreshGuardsBtn" title="Оновити охорону">🔄</button>
            </div>
        </div>

        <div class="form-group">
            <label>ПІН-код охоронця</label>
            <input type="password" id="guard_pin" class="pin-field" maxlength="4" inputmode="numeric" placeholder="••••">
        </div>

        <button class="btn-submit" id="submit-action">ОТРИМАТИ КЛЮЧ</button>
        <a href="index.html" class="btn-back">⬅ На головну</a>
    </div>
</div>

<script>
(function() {
    // Перевіряємо наявність глобальної функції getCachedData
    if (typeof window.getCachedData !== 'function') {
        window.getCachedData = async function(key, force = false) {
            const cacheKey = `cached_${key}`;
            const cached = sessionStorage.getItem(cacheKey);
            if (!force && cached) {
                try { return JSON.parse(cached).data; } catch(e) {}
            }
            const url = window.getApiUrl ? window.getApiUrl() : localStorage.getItem('apps_script_url');
            if (!url) return null;
            let response;
            if (key === 'users') response = await fetch(`${url}?logType=users`);
            else if (key === 'locations') response = await fetch(`${url}?logType=locations`);
            else return null;
            const data = await response.json();
            if (Array.isArray(data)) {
                sessionStorage.setItem(cacheKey, JSON.stringify({ timestamp: Date.now(), data }));
                return data;
            }
            return [];
        };
    }

    // ========== ЗАВАНТАЖЕННЯ ДАНИХ ==========
    async function loadWorkers() {
        const select = document.getElementById('worker-list');
        if (!select) return;
        const users = await window.getCachedData('users');
        if (!users) { select.innerHTML = '<option value="">-- Помилка --</option>'; return; }
        const workers = users.filter(u => !u.role || u.role.toLowerCase() !== 'охорона');
        select.innerHTML = '<option value="">-- Виберіть співробітника --</option>';
        workers.forEach(w => {
            const opt = document.createElement('option');
            opt.value = w.name;
            opt.textContent = w.name;
            select.appendChild(opt);
        });
    }

    async function loadGuards() {
        const select = document.getElementById('guard_name');
        if (!select) return;
        const users = await window.getCachedData('users');
        if (!users) { select.innerHTML = '<option value="">-- Помилка --</option>'; return; }
        const guards = users.filter(u => u.role && u.role.toLowerCase() === 'охорона');
        select.innerHTML = '<option value="">-- Виберіть охоронця --</option>';
        guards.forEach(g => {
            const opt = document.createElement('option');
            opt.value = g.name;
            opt.textContent = g.name;
            select.appendChild(opt);
        });
    }

    async function loadLocations(selectId) {
        const select = document.getElementById(selectId);
        if (!select) return;
        const locations = await window.getCachedData('locations');
        if (!locations) { select.innerHTML = '<option value="">-- Помилка --</option>'; return; }
        select.innerHTML = '<option value="">-- Виберіть приміщення --</option>';
        locations.forEach(loc => {
            const opt = document.createElement('option');
            opt.value = loc.code;
            opt.textContent = loc.name;
            select.appendChild(opt);
        });
    }

    // ========== ЛОГІКА ПЕРЕМИКАННЯ РЕЖИМІВ ==========
    let currentMode = 'issue';

    function setMode(mode) {
        currentMode = mode;
        const issueBtn = document.getElementById('mode-issue');
        const returnBtn = document.getElementById('mode-return');
        const issueFields = document.getElementById('issue-fields');
        const returnFields = document.getElementById('return-fields');
        const submitBtn = document.getElementById('submit-action');
        if (mode === 'issue') {
            issueBtn.className = 'mode-btn active-issue';
            returnBtn.className = 'mode-btn';
            issueFields.style.display = 'block';
            returnFields.style.display = 'none';
            submitBtn.textContent = 'ОТРИМАТИ КЛЮЧ';
            submitBtn.style.background = '#f57c00';
        } else {
            returnBtn.className = 'mode-btn active-return';
            issueBtn.className = 'mode-btn';
            issueFields.style.display = 'none';
            returnFields.style.display = 'block';
            submitBtn.textContent = 'ПОВЕРНУТИ КЛЮЧ';
            submitBtn.style.background = '#475569';
        }
    }

    // ========== ВІДПРАВЛЕННЯ ==========
    async function handleSubmit() {
        const guardName = document.getElementById('guard_name').value;
        const pin = document.getElementById('guard_pin').value;
        if (!guardName) { showMessage("Оберіть охоронця", "error"); return; }
        if (!pin || pin.length !== 4) { showMessage("Введіть 4-цифровий ПІН-код", "error"); return; }

        const users = await window.getCachedData('users');
        const guards = users.filter(u => u.role && u.role.toLowerCase() === 'охорона');
        const guard = guards.find(g => g.name === guardName);
        if (!guard || guard.pin !== pin) {
            showMessage("Невірний ПІН-код охоронця", "error");
            document.getElementById('guard_pin').value = "";
            return;
        }

        const apiUrl = window.getApiUrl ? window.getApiUrl() : localStorage.getItem('apps_script_url');
        if (!apiUrl) { showMessage("API не налаштовано", "error"); return; }

        const url = new URL(apiUrl);
        let locationName = "";
        if (currentMode === 'issue') {
            const worker = document.getElementById('worker-list').value;
            const locationCode = document.getElementById('location-list').value;
            locationName = document.getElementById('location-list').options[document.getElementById('location-list').selectedIndex]?.text || "";
            if (!worker) { showMessage("Оберіть співробітника", "error"); return; }
            if (!locationCode) { showMessage("Оберіть приміщення", "error"); return; }
            url.searchParams.append('action', 'reg_keys');
            url.searchParams.append('worker', worker);
            url.searchParams.append('key_name', locationName);
            url.searchParams.append('key_code', locationCode);
            url.searchParams.append('type', 'ВЗЯВ');
            url.searchParams.append('guard', guardName);
        } else {
            const locationCode = document.getElementById('return-location-list').value;
            locationName = document.getElementById('return-location-list').options[document.getElementById('return-location-list').selectedIndex]?.text || "";
            if (!locationCode) { showMessage("Оберіть приміщення", "error"); return; }
            url.searchParams.append('action', 'reg_keys');
            url.searchParams.append('key_name', locationName);
            url.searchParams.append('key_code', locationCode);
            url.searchParams.append('type', 'ЗДАВ');
            url.searchParams.append('guard', guardName);
        }
        try {
            const resp = await fetch(url.toString());
            const result = await resp.json();
            if (result.status === "success") {
                showMessage(currentMode === 'issue' ? `✅ Видача ключа: ${locationName}` : `✅ Повернення ключа: ${locationName}`, "success");
                if (currentMode === 'issue') document.getElementById('worker-list').value = "";
                document.getElementById(currentMode === 'issue' ? 'location-list' : 'return-location-list').value = "";
                document.getElementById('guard_pin').value = "";
            } else throw new Error(result.message);
        } catch(e) { showMessage("Помилка: " + e.message, "error"); }
    }

    function showMessage(msg, type) {
        const div = document.getElementById('message-area');
        if (div) div.innerHTML = `<div class="${type}">${msg}</div>`;
        setTimeout(() => { if (div && div.innerHTML === `<div class="${type}">${msg}</div>`) div.innerHTML = ""; }, 4000);
    }

    // ========== ІНІЦІАЛІЗАЦІЯ (cloneNode ДЛЯ НАДІЙНОСТІ) ==========
    async function initKeysPage() {
        await Promise.all([
            loadWorkers(),
            loadGuards(),
            loadLocations('location-list'),
            loadLocations('return-location-list')
        ]);

        // Клонуємо кнопки для уникнення дублювання подій
        const issueBtn = document.getElementById('mode-issue');
        if (issueBtn) {
            const newBtn = issueBtn.cloneNode(true);
            issueBtn.parentNode.replaceChild(newBtn, issueBtn);
            newBtn.addEventListener('click', () => setMode('issue'));
        }
        const returnBtn = document.getElementById('mode-return');
        if (returnBtn) {
            const newBtn = returnBtn.cloneNode(true);
            returnBtn.parentNode.replaceChild(newBtn, returnBtn);
            newBtn.addEventListener('click', () => setMode('return'));
        }

        const refreshWorkers = document.getElementById('refreshWorkersBtn');
        if (refreshWorkers) {
            const newBtn = refreshWorkers.cloneNode(true);
            refreshWorkers.parentNode.replaceChild(newBtn, refreshWorkers);
            newBtn.addEventListener('click', async () => {
                await window.getCachedData('users', true);
                await loadWorkers();
                showMessage("✅ Список співробітників оновлено", "success");
            });
        }
        const refreshGuards = document.getElementById('refreshGuardsBtn');
        if (refreshGuards) {
            const newBtn = refreshGuards.cloneNode(true);
            refreshGuards.parentNode.replaceChild(newBtn, refreshGuards);
            newBtn.addEventListener('click', async () => {
                await window.getCachedData('users', true);
                await loadGuards();
                showMessage("✅ Список охоронців оновлено", "success");
            });
        }
        const refreshLocs = document.getElementById('refreshLocationsBtn');
        if (refreshLocs) {
            const newBtn = refreshLocs.cloneNode(true);
            refreshLocs.parentNode.replaceChild(newBtn, refreshLocs);
            newBtn.addEventListener('click', async () => {
                await window.getCachedData('locations', true);
                await loadLocations('location-list');
                showMessage("✅ Список приміщень оновлено", "success");
            });
        }
        const refreshReturnLocs = document.getElementById('refreshReturnLocationsBtn');
        if (refreshReturnLocs) {
            const newBtn = refreshReturnLocs.cloneNode(true);
            refreshReturnLocs.parentNode.replaceChild(newBtn, refreshReturnLocs);
            newBtn.addEventListener('click', async () => {
                await window.getCachedData('locations', true);
                await loadLocations('return-location-list');
                showMessage("✅ Список приміщень оновлено", "success");
            });
        }

        const submitBtn = document.getElementById('submit-action');
        if (submitBtn) {
            const newBtn = submitBtn.cloneNode(true);
            submitBtn.parentNode.replaceChild(newBtn, submitBtn);
            newBtn.addEventListener('click', handleSubmit);
        }

        setMode('issue');
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initKeysPage);
    } else {
        initKeysPage();
    }
})();
</script>
</body>
</html>
