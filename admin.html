<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Охорони | Admin</title>
    <style>
        :root { --admin-color: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; }
        
        /* Авторизація */
        .login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        
        /* Панель керування */
        .admin-panel { display: none; padding: 10px; }
        .header { background: var(--admin-color); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 15px 15px; }
        
        /* Таби */
        .tab-menu { display: flex; overflow-x: auto; background: white; padding: 10px; gap: 10px; margin-top: 10px; border-radius: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #eee; border-radius: 8px; cursor: pointer; white-space: nowrap; font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: white; }

        /* Таблиці */
        .table-container { background: white; margin-top: 15px; border-radius: 10px; overflow-x: auto; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #f8f9fa; color: #666; }

        input, select, .btn-login { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-login { background: var(--admin-color); color: white; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-card">
        <h2>🛡️ Вхід Адміна</h2>
        <label>Оберіть охоронця</label>
        <select id="admin-user">
            <option value="Ковальчук О.">Ковальчук О.</option>
            <option value="Олійник В.">Олійник В.</option>
            <option value="Сидоренко М.">Сидоренко М.</option>
        </select>
        <input type="password" id="admin-pin" placeholder="Введіть ПІН-код" maxlength="4" inputmode="numeric" style="text-align: center; letter-spacing: 5px;">
        <button class="btn-login" onclick="tryLogin()">УВІЙТИ</button>
        <a href="index.html" style="text-decoration: none; font-size: 13px; color: #888;">Повернутись в меню</a>
    </div>
</div>

<div id="admin-panel" class="admin-panel">
    <div class="header">
        <span><b>ADMIN:</b> <span id="active-user">---</span></span>
        <button onclick="location.reload()" style="background:none; border: 1px solid white; color:white; border-radius: 5px; padding: 5px 10px; cursor:pointer;">Вихід</button>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="loadLog('auto')">🚚 Авто</button>
        <button class="tab-btn" onclick="loadLog('workers')">👤 Співробітники</button>
        <button class="tab-btn" onclick="loadLog('passes')">🎫 Перепустки</button>
        <button class="tab-btn" onclick="loadLog('keys')">🔑 Ключі</button>
    </div>
	<script>
    // 1. Логіка ініціалізації API (як у ScanBox)
    document.addEventListener("DOMContentLoaded", function() {
        let API_URL = localStorage.getItem('apps_script_url');

        if (!API_URL) {
            API_URL = prompt("Вставте посилання на ваш Google Apps Script (Web App URL):");
            if (API_URL && API_URL.includes("script.google.com")) {
                localStorage.setItem('apps_script_url', API_URL);
                alert("API успішно збережено!");
            } else if (API_URL) {
                alert("Схоже, посилання некоректне. Спробуйте ще раз.");
                localStorage.removeItem('apps_script_url');
            }
        }
    });

    // 2. Функція для зміни посилання
    function resetApiUrl() {
        let conf = confirm("Бажаєте змінити посилання на Apps Script?");
        if (conf) {
            localStorage.removeItem('apps_script_url');
            location.reload();
        }
    }
</script>
