<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Охорони | Admin</title>
    <style>
        :root { --admin-color: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; }
        .login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        .admin-panel { display: none; padding: 10px; }
        .header { background: var(--admin-color); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 15px 15px; }
        .tab-menu { display: flex; overflow-x: auto; background: white; padding: 10px; gap: 10px; margin-top: 10px; border-radius: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #eee; border-radius: 8px; cursor: pointer; white-space: nowrap; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: white; }
        .table-container { background: white; margin-top: 15px; border-radius: 10px; overflow-x: auto; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #f8f9fa; color: #666; position: sticky; top: 0; }
        input, select, .btn-login { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-login { background: var(--admin-color); color: white; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-card">
        <h2>🛡️ Вхід Адміна</h2>
        <label>Оберіть охоронця</label>
        <select id="admin-user">
            <option value="Ковальчук О.">Ковальчук О.</option>
            <option value="Олійник В.">Олійник В.</option>
            <option value="Сидоренко М.">Сидоренко М.</option>
        </select>
        <input type="password" id="admin-pin" placeholder="Введіть ПІН-код" maxlength="4" inputmode="numeric" style="text-align: center; letter-spacing: 5px;">
        <button class="btn-login" onclick="tryLogin()">УВІЙТИ</button>
        <a href="index.html" style="text-decoration: none; font-size: 13px; color: #888; display: block; margin-top: 10px;">Повернутись в меню</a>
    </div>
</div>

<div id="admin-panel" class="admin-panel">
    <div class="header">
        <span><b>ADMIN:</b> <span id="active-user">---</span></span>
        <button onclick="location.reload()" style="background:none; border: 1px solid white; color:white; border-radius: 5px; padding: 5px 10px; cursor:pointer;">Вихід</button>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="loadLog('auto', event)">🚚 Авто</button>
        <button class="tab-btn" onclick="loadLog('workers', event)">👤 Співробітники</button>
        <button class="tab-btn" onclick="loadLog('passes', event)">🎫 Перепустки</button>
        <button class="tab-btn" onclick="loadLog('keys', event)">🔑 Ключі</button>
    </div>

    <div id="log-content" class="table-container">
        <p style="padding: 20px; color: #888;">Оберіть журнал для перегляду</p>
    </div>
</div>

<script>
    const API_URL = localStorage.getItem('apps_script_url');

    const guards = { 
        "Ковальчук О.": "7777", 
        "Олійник В.": "8888", 
        "Сидоренко М.": "9999" 
    };

    function tryLogin() {
        const user = document.getElementById('admin-user').value;
        const pin = document.getElementById('admin-pin').value;

        if (guards[user] === pin) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('active-user').innerText = user;
            loadLog('auto'); // Завантаження за замовчуванням
        } else {
            alert("❌ Невірний ПІН-код!");
            document.getElementById('admin-pin').value = "";
        }
    }

    async function loadLog(type, event) {
        if (!API_URL) {
            alert("Спочатку налаштуйте API на головній сторінці!");
            return;
        }

        // Перемикання стилю кнопок
        if (event) {
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        const container = document.getElementById('log-content');
        container.innerHTML = "<p style='padding:20px;'>⏳ Завантаження даних...</p>";

        try {
            const response = await fetch(`${API_URL}?logType=${type}`);
            const data = await response.json();
            renderTable(data);
        } catch (error) {
            console.error("Помилка:", error);
            container.innerHTML = "<p style='padding:20px; color:red;'>❌ Помилка з'єднання з Google Таблицею.</p>";
        }
    }

    function renderTable(data) {
        const container = document.getElementById('log-content');
        
        if (!data || data.length === 0) {
            container.innerHTML = "<p style='padding:20px;'>Журнал порожній.</p>";
            return;
        }

        let html = `<table><thead><tr>`;
        const headers = Object.keys(data[0]);
        headers.forEach(h => html += `<th>${h}</th>`);
        html += `</tr></thead><tbody>`;

        data.forEach(row => {
            html += `<tr>`;
            headers.forEach(h => html += `<td>${row[h] || ""}</td>`);
            html += `</tr>`;
        });

        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    document.addEventListener("DOMContentLoaded", function() {
        if (!API_URL) {
            let url = prompt("Вставте посилання на ващ Google Apps Script:");
            if (url && url.includes("script.google.com")) {
                localStorage.setItem('apps_script_url', url);
                location.reload();
            }
        }
    });
</script>

</body>
</html>
