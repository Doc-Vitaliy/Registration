<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід в адмін-панель | DC-Link</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
<div class="container">
    <div class="login-card card">
        <h2> Вхід в адмін-панель</h2>
        <div id="message"></div>
        <div class="form-group">
            <label>Оберіть охоронця</label>
            <div class="select-wrapper">
                <select id="admin-user">
                    <option value="">-- Завантаження --</option>
                </select>
                <button type="button" class="btn-refresh-inline" id="refreshGuardsBtn">🔄</button>
            </div>
        </div>
        <div class="form-group">
            <label>ПІН-код (4 цифри)</label>
            <input type="password" id="admin-pin" class="pin-field" maxlength="4" inputmode="numeric" placeholder="****">
        </div>
        <button class="btn-login" id="login-btn">УВІЙТИ</button>
        <a href="index.html" class="back-link" id="back-to-main">⬅ Повернутись в меню</a>
    </div>
</div>

<script>
(function() {
    // Якщо функції вже визначені в глобальному об'єкті, не визначаємо їх повторно
    if (window._adminFunctionsDefined) {
        initAdminPage();
        return;
    }
    window._adminFunctionsDefined = true;

    let allUsers = [];

    // ========== ЗАВАНТАЖЕННЯ СПИСКУ ОХОРОНЦІВ (з кешем) ==========
    async function loadGuards(forceRefresh = false) {
        const select = document.getElementById('admin-user');
        if (!select) return;
        select.innerHTML = '<option value="">-- Завантаження... --</option>';
        const users = await window.getCachedData('users', forceRefresh);
        if (!users) {
            select.innerHTML = '<option value="">-- Помилка завантаження --</option>';
            return;
        }
        allUsers = users;
        const guards = allUsers.filter(u => u.role && u.role.toLowerCase() === "охорона");
        if (guards.length === 0) {
            select.innerHTML = '<option value="">-- Немає охоронців --</option>';
            return;
        }
        select.innerHTML = '<option value="">-- Виберіть охоронця --</option>';
        guards.forEach(g => {
            const opt = document.createElement('option');
            opt.value = g.name;
            opt.textContent = g.name;
            select.appendChild(opt);
        });
    }

    // ========== ЛОГІН ==========
    async function tryLogin() {
        const userName = document.getElementById('admin-user').value;
        const pin = document.getElementById('admin-pin').value;
        if (!userName) { showMessage("Оберіть охоронця", "error"); return; }
        if (!pin || pin.length !== 4) { showMessage("Введіть 4-цифровий ПІН", "error"); return; }
        if (allUsers.length === 0) await loadGuards(false);
        const guard = allUsers.find(u => u.name === userName && u.role && u.role.toLowerCase() === "охорона");
        if (!guard) { showMessage("Користувач не є охоронцем", "error"); return; }
        if (guard.pin !== pin) { showMessage("Невірний ПІН-код", "error"); return; }
        sessionStorage.setItem('current_admin', JSON.stringify({ name: guard.name, pin: guard.pin }));
        window.location.href = 'admin_dashboard.html';
    }

    function showMessage(msg, type) {
        const div = document.getElementById('message');
        div.innerHTML = `<div class="${type}">${msg}</div>`;
        setTimeout(() => div.innerHTML = "", 4000);
    }

    // ========== ІНІЦІАЛІЗАЦІЯ (КОЖНОГО РАЗУ) ==========
    async function initAdminPage() {
        await loadGuards(false);

        // Кнопка оновлення списку
        const refreshBtn = document.getElementById('refreshGuardsBtn');
        if (refreshBtn) {
            const newBtn = refreshBtn.cloneNode(true);
            refreshBtn.parentNode.replaceChild(newBtn, refreshBtn);
            newBtn.addEventListener('click', async () => {
                await loadGuards(true);
                showMessage("🔄 Список охоронців оновлено", "success");
            });
        }

        // Кнопка логіну
        const loginBtn = document.getElementById('login-btn');
        if (loginBtn) {
            const newBtn = loginBtn.cloneNode(true);
            loginBtn.parentNode.replaceChild(newBtn, loginBtn);
            newBtn.addEventListener('click', tryLogin);
        }

        // Посилання "На головну" (потрібне для AJAX-навігації)
        const backLink = document.getElementById('back-to-main');
        if (backLink) {
            const newLink = backLink.cloneNode(true);
            backLink.parentNode.replaceChild(newLink, backLink);
            newLink.addEventListener('click', (e) => {
                e.preventDefault();
                if (typeof window.loadMainMenu === 'function') window.loadMainMenu();
                else window.location.href = 'index.html';
            });
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initAdminPage);
    } else {
        initAdminPage();
    }
})();
</script>
</body>
</html>
