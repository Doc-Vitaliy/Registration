<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал відвідувачів | DC-Link</title>
</head>
<body>
<div class="container">
    <div class="card">
        <h2> Журнал відвідувачів</h2>
        <div id="message"></div>

        <div class="form-group">
            <label>ПІБ відвідувача *</label>
            <input type="text" id="visitor_name" placeholder="Прізвище Ім'я По батькові" required>
        </div>

        <div class="form-group">
            <label>ПІБ супроводжуючого *</label>
            <input type="text" id="accompanying" placeholder="Хто супроводжує" required>
        </div>

        <div class="form-group">
            <label>№ поста охорони *</label>
            <input type="text" id="post_number" placeholder="Наприклад: 1, 2, 3..." required>
        </div>

        <hr>

        <div class="form-group">
            <label>Охоронець (хто реєструє)</label>
            <div class="select-wrapper">
                <select id="guard_name"><option value="">-- Завантаження --</option></select>
                <button type="button" class="btn-refresh-inline" id="refreshGuardsBtn" title="Оновити список">🔄</button>
            </div>
        </div>

        <div class="form-group">
            <label>ПІН-код охоронця</label>
            <input type="password" id="guard_pin" class="pin-field" maxlength="4" inputmode="numeric" placeholder="••••">
        </div>

        <button class="btn-submit" id="submit-action">ЗАРЕЄСТРУВАТИ ВІДВІДУВАЧА</button>
        <a href="index.html" class="btn-back">⬅ На головну</a>
    </div>
</div>

<script>
(function() {
    // Перевіряємо наявність глобальної функції getCachedData
    if (typeof window.getCachedData !== 'function') {
        window.getCachedData = async function(key, force = false) {
            const cacheKey = `cached_${key}`;
            const cached = sessionStorage.getItem(cacheKey);
            if (!force && cached) {
                try { return JSON.parse(cached).data; } catch(e) {}
            }
            const url = window.getApiUrl ? window.getApiUrl() : localStorage.getItem('apps_script_url');
            if (!url) return null;
            if (key === 'users') {
                const resp = await fetch(`${url}?logType=users`);
                const data = await resp.json();
                if (Array.isArray(data)) {
                    sessionStorage.setItem(cacheKey, JSON.stringify({ timestamp: Date.now(), data }));
                    return data;
                }
            }
            return [];
        };
    }

    // ========== ЗАВАНТАЖЕННЯ ОХОРОНЦІВ ==========
    async function loadGuards() {
        const select = document.getElementById('guard_name');
        if (!select) return;
        const users = await window.getCachedData('users');
        if (!users) { select.innerHTML = '<option value="">-- Помилка --</option>'; return; }
        const guards = users.filter(u => u.role && u.role.toLowerCase() === 'охорона');
        select.innerHTML = '<option value="">-- Виберіть охоронця --</option>';
        guards.forEach(g => {
            const opt = document.createElement('option');
            opt.value = g.name;
            opt.textContent = g.name;
            select.appendChild(opt);
        });
    }

    // ========== ВІДПРАВЛЕННЯ ==========
    async function handleSubmit() {
        const visitor = document.getElementById('visitor_name').value.trim();
        const accompanying = document.getElementById('accompanying').value.trim();
        const post = document.getElementById('post_number').value.trim();
        const guardName = document.getElementById('guard_name').value;
        const pin = document.getElementById('guard_pin').value;

        if (!visitor || !accompanying || !post) { showMessage("Заповніть усі обов'язкові поля", "error"); return; }
        if (!guardName) { showMessage("Оберіть охоронця", "error"); return; }
        if (!pin || pin.length !== 4 || !/^\d{4}$/.test(pin)) { showMessage("Введіть 4-цифровий ПІН-код", "error"); return; }

        const users = await window.getCachedData('users');
        const guards = users.filter(u => u.role && u.role.toLowerCase() === 'охорона');
        const guard = guards.find(g => g.name === guardName);
        if (!guard || guard.pin !== pin) {
            showMessage("Невірний ПІН-код охоронця", "error");
            document.getElementById('guard_pin').value = "";
            return;
        }

        const apiUrl = window.getApiUrl ? window.getApiUrl() : localStorage.getItem('apps_script_url');
        if (!apiUrl) { showMessage("API не налаштовано", "error"); return; }

        const url = new URL(apiUrl);
        url.searchParams.append('action', 'reg_visitor');
        url.searchParams.append('visitor', visitor);
        url.searchParams.append('accompanying', accompanying);
        url.searchParams.append('post', post);
        url.searchParams.append('guard', guardName);

        try {
            const resp = await fetch(url.toString());
            const result = await resp.json();
            if (result.status === "success") {
                showMessage(`✅ Відвідувача ${visitor} зареєстровано`, "success");
                document.getElementById('visitor_name').value = "";
                document.getElementById('accompanying').value = "";
                document.getElementById('post_number').value = "";
                document.getElementById('guard_pin').value = "";
            } else throw new Error(result.message);
        } catch(e) { showMessage("❌ Помилка: " + e.message, "error"); }
    }

    function showMessage(msg, type) {
        const div = document.getElementById('message');
        if (div) div.innerHTML = `<div class="${type}">${msg}</div>`;
        setTimeout(() => { if (div && div.innerHTML === `<div class="${type}">${msg}</div>`) div.innerHTML = ""; }, 4000);
    }

    // ========== ІНІЦІАЛІЗАЦІЯ (cloneNode ДЛЯ НАДІЙНОСТІ) ==========
    async function initVisitorsPage() {
        await loadGuards();

        const refreshBtn = document.getElementById('refreshGuardsBtn');
        if (refreshBtn) {
            const newBtn = refreshBtn.cloneNode(true);
            refreshBtn.parentNode.replaceChild(newBtn, refreshBtn);
            newBtn.addEventListener('click', async () => {
                await window.getCachedData('users', true);
                await loadGuards();
                showMessage("🔄 Список охоронців оновлено", "success");
            });
        }

        const submitBtn = document.getElementById('submit-action');
        if (submitBtn) {
            const newBtn = submitBtn.cloneNode(true);
            submitBtn.parentNode.replaceChild(newBtn, submitBtn);
            newBtn.addEventListener('click', handleSubmit);
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initVisitorsPage);
    } else {
        initVisitorsPage();
    }
})();
</script>
</body>
</html>
